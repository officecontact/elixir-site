<script id="static-nav-script">
(function(){
  var NAV_HTML = '<div id="static-nav" style="position:fixed;top:8px;left:0;right:0;z-index:10000;display:flex;justify-content:center;padding:0 24px;pointer-events:none;">'
  + '<div style="width:80%;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:10px 24px;pointer-events:all;">'

  + '</a>'

  // Nav links
  + '<nav style="display:flex;align-items:center;gap:4px;">'

  // Our Company
  + dd('Our Company', [
      ['/ourcompany#home','Who We Are'],
      ['/ourcompany#about','About Us'],
      ['/ourcompany#overview','Company Overview'],
      ['/ourcompany#story','Our Story'],
      ['/ourcompany#team','Get to Know Us'],
      ['/ourcompany#business-model','Business Model'],
      ['/ourcompany#workflow','How We Work'],
      ['/ourcompany#approach','Our Approach']
    ])

  // Services
  + dd('Services', [
      ['/services/webDev','Web Development'],
      ['/services/mobileAppDev','Mobile App Development'],
      ['/services/appDev','Application Development'],
      ['/services/aiml','AI &amp; Machine Learning'],
      ['/services/blockchain','Blockchain Solutions'],
      ['/services/cloudsolutions','Cloud Solutions'],
      ['/services/cybersec','Cybersecurity Services'],
      ['/services/systemintegration','System Integration'],
      ['/services/cms','Content Management System'],
      ['/services/qatesting','QA &amp; Testing'],
      ['/services/gamedev','Game Development'],
      ['/services/supplychain','Supply Chain Solutions'],
      ['/services/digitalmarketing','Digital Marketing &amp; Branding']
    ])

  // Innovations
  + dd('Innovations &amp; Solutions', [
      ['/portfolio','View All Projects']
    ])

  + '</nav>'

  // Blogs button
  + '<a href="/blogs" style="padding:8px 18px;border-radius:999px;background:white;color:black;text-decoration:none;font-size:14px;font-weight:500;"'
  + ' onmouseenter="this.style.background=\'#e5e5e5\'" onmouseleave="this.style.background=\'white\'">Blogs</a>'

  + '</div></div>';

  function dd(label, items) {
    var links = items.map(function(i){
      return '<a href="'+i[0]+'" style="display:block;padding:9px 18px;color:#ccc;text-decoration:none;font-size:14px;"'
           + ' onmouseenter="this.style.color=\'#fff\';this.style.background=\'rgba(255,255,255,0.06)\'"'
           + ' onmouseleave="this.style.color=\'#ccc\';this.style.background=\'transparent\'">'+i[1]+'</a>';
    }).join('');
    return '<div style="position:relative;" onmouseenter="this.querySelector(\'.sndd\').style.display=\'block\'" onmouseleave="this.querySelector(\'.sndd\').style.display=\'none\'">'
      + '<div style="color:white;cursor:pointer;padding:8px 14px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;font-size:14px;"'
      + ' onmouseenter="this.style.background=\'rgba(255,255,255,0.1)\'" onmouseleave="this.style.background=\'transparent\'">'
      + '<span>'+label+'</span>'
      + '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>'
      + '</div>'
      + '<div class="sndd" style="display:none;position:absolute;top:calc(100% + 8px);left:0;background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:12px;min-width:230px;padding:8px 0;z-index:10001;box-shadow:0 8px 32px rgba(0,0,0,0.5);">'
      + links + '</div></div>';
  }

  // Also add top spacer
  var SPACER_HTML = '<div id="static-nav-spacer" style="height:72px;"></div>';

  function inject() {
    if (document.getElementById('static-nav')) return; // already there
    if (!document.body) return;
    // hide original React nav
    var reactNav = document.querySelector('div.fixed.w-full');
    if (reactNav && reactNav.id !== 'static-nav') reactNav.style.display = 'none';
    // inject our nav
    var tmp = document.createElement('div');
    tmp.innerHTML = NAV_HTML + SPACER_HTML;
    document.body.insertBefore(tmp.lastChild, document.body.firstChild); // spacer
    document.body.insertBefore(tmp.firstChild, document.body.firstChild); // nav
  }

  // Run immediately, and keep checking for 3s in case React hydration wipes it
  inject();
  var attempts = 0;
  var timer = setInterval(function(){
    inject();
    attempts++;
    if (attempts > 30) clearInterval(timer);
  }, 100);
})();
</script>
